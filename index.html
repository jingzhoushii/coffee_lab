        {time:55,end:80,label:"第三段注水至 200g",detail:"同心圆注水，避免冲到滤纸"},
        {time:80,end:100,label:"第四段注水至 270g",detail:"中心注水收尾"},
        {time:100,end:150,label:"等待滴滤完成",detail:"总萃取时间 2:30"},
      ],
      flavorHints:["明亮清晰的酸质","均衡的甜感与花果层次"],
      tastingTips:["注意入口时的清澈感","感受酸甜的平衡过渡","余韵应该干净且持久"]
    },
    { name: "Carlos Medina", title: "2024 WBrC 冠军 🇨🇱", bean: "Natural Sidra · Café Granja la Esperanza", dripper: "Origami Air S", dose: 15.5, water: 250, temp: "91°C", ratio: "1:16", grind: "ZP6 Special 5.2格", totalTime: 150,
      technique: "五段均匀注水法，每30秒注入50g水。搅拌整合所有风味。",
      steps: [
        {time:0,end:30,label:"第一段: 50g·91°C",detail:"均匀注水，等待30秒"},
        {time:30,end:60,label:"第二段: 注至100g",detail:"保持同样节奏注水"},
        {time:60,end:90,label:"第三段: 注至150g",detail:"稳定水流，匀速注水"},
        {time:90,end:120,label:"第四段: 注至200g",detail:"继续均匀注水"},
        {time:120,end:150,label:"第五段: 注至250g + 搅拌",detail:"注完后轻柔搅拌整合风味"},
      ],
      flavorHints:["Sidra品种的白葡萄与玫瑰花香","日晒处理的浓郁甜感"],
      tastingTips:["感受Sidra品种独特的清新感","注意日晒带来的发酵层次","对比不同温度下的风味变化"]
    },
    { name: "Ryan Wibawa", title: "2024 WBrC 季军 🇮🇩", bean: "精品竞赛用豆", dripper: "Hario Switch (浸泡式)", dose: 15, water: 220, temp: "86°C", ratio: "1:15", grind: "中等研磨", totalTime: 180,
      technique: "浸泡+滴滤混合萃取，用Switch阀门控制。低温浸泡减少苦味。",
      steps: [
        {time:0,end:40,label:"关阀浸泡: 100g·86°C",detail:"Switch关闭，完全浸泡式闷蒸"},
        {time:40,end:50,label:"开阀释放",detail:"打开Switch阀门，让闷蒸液流出"},
        {time:50,end:60,label:"关阀: 注入120g·86°C",detail:"再次关阀，继续浸泡"},
        {time:60,end:110,label:"浸泡等待 50秒",detail:"让咖啡粉充分接触水"},
        {time:110,end:120,label:"轻柔旋转",detail:"温和旋转确保粉床平整"},
        {time:120,end:180,label:"开阀滴滤完成",detail:"打开阀门，等待完全滴完"},
      ],
      flavorHints:["浸泡式萃取带来更醇厚的口感","低温减少涩感，突出甜感"],
      tastingTips:["对比与纯滴滤的口感差异","注意body的丰厚程度","余韵应绵长且甜蜜"]
    },
  ];

  // Generate recipe based on mode
  const recipe = useMemo(() => {
    if (mode === "champion") {
      const c = CHAMP_RECIPES[champIdx];
      return { ratio: c.ratio, waterTotal: c.water, temp: c.temp, bloomWater: 50, steps: c.steps, flavorHints: c.flavorHints, tastingTips: c.tastingTips, totalTime: c.totalTime, dose: c.dose };
    }
    const ratio = roast === "深烘" || roast === "中深烘" ? 14 : roast === "中烘" ? 15 : 16;
    const waterTotal = dose * ratio;
    const temp = roast === "深烘" ? 87 : roast === "中深烘" ? 89 : roast === "中烘" ? 91 : roast === "浅中烘" ? 92 : 93;
    const bloomWater = Math.round(dose * 2);
    const isLight = roast === "浅烘" || roast === "浅中烘";
    const isDark = roast === "深烘" || roast === "中深烘";

    let flavorHints = [];
    if (process === "水洗") flavorHints.push("干净明亮的酸质", "清晰的产地风味");
    else if (process === "日晒") flavorHints.push("浓郁果香和甜感", "发酵调性");
    else if (process === "蜜处理") flavorHints.push("蜂蜜般甜感", "柔和果酸");
    else if (process === "湿刨法") flavorHints.push("醇厚的草药与泥土风味", "低酸高醇");
    else if (process === "厌氧发酵") flavorHints.push("热带水果与发酵香", "复杂层次感");
    else if (process === "酒桶发酵") flavorHints.push("酒香与蜜饯风味", "独特发酵感");
    if (isLight) flavorHints.push("花果调性突出");
    else if (isDark) flavorHints.push("焦糖与坚果调性");
    if (variety === "Geisha") flavorHints.push("茉莉花香与佛手柑");
    else if (variety === "SL28") flavorHints.push("黑醋栗与明亮酸质");
    else if (variety === "Bourbon") flavorHints.push("甜蜜均衡的经典风味");
    else if (variety === "Sidra") flavorHints.push("白葡萄与玫瑰花香");

    let tastingTips = isLight
      ? ["啜吸时注意前段的花果香气", "温度降至60°C左右时风味最丰富", "注意余韵的甜感变化"]
      : isDark ? ["注意入口时的醇厚口感", "留意焦糖和坚果的层次", "温度降低后甜感会更明显"]
      : ["啜吸感受酸甜平衡", "注意中段的风味变化", "对比热饮和温饮的差异"];

    const pour1 = Math.round(waterTotal * 0.4);
    const pour2 = Math.round(waterTotal * 0.7);
    const steps = [
      { time: 0, end: 30, label: `闷蒸: 注入 ${bloomWater}g 水`, detail: `中心向外画圈注水，确保所有咖啡粉均匀湿润。水温 ${temp}°C` },
      { time: 30, end: 55, label: `第一段注水至 ${pour1}g`, detail: isLight ? "缓慢绕圈注水，保持水位稳定" : "稍快速注水，水柱粗一些" },
      { time: 55, end: 85, label: `第二段注水至 ${pour2}g`, detail: "从中心向外画小圆，避免冲到滤纸边缘" },
      { time: 85, end: 115, label: `第三段注水至 ${waterTotal}g`, detail: "最后一段可以稍快注入，调整总水量" },
      { time: 115, end: isDark ? 140 : 160, label: "等待滴滤完成", detail: `目标总时间 ${isDark ? "2:20" : "2:40"}，如偏快可磨细，偏慢可磨粗` },
    ];

    return { ratio: `1:${ratio}`, waterTotal, temp: `${temp}°C`, bloomWater, steps, flavorHints, tastingTips, totalTime: isDark ? 140 : 160, dose };
  }, [mode, champIdx, variety, process, roast, dose]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  useEffect(() => {
    if (seconds >= recipe.totalTime && running) {
      setRunning(false);
      setStep("done");
    }
  }, [seconds, recipe.totalTime, running]);

  const currentStep = recipe.steps.find(s => seconds >= s.time && seconds < s.end);
  const progress = Math.min(seconds / recipe.totalTime, 1);
  const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

  const startBrew = () => { setStep("brewing"); setSeconds(0); setRunning(true); };
  const reset = () => { setSeconds(0); setRunning(false); setStep("setup"); };

  const InputRow = ({ label, children }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 12, color: theme.textSec, marginBottom: 6, fontWeight: 500 }}>{label}</div>
      {children}
    </div>
  );

  const Chip = ({ selected, label, onClick }) => (
    <button onClick={onClick} style={{ padding: "6px 12px", borderRadius: 10, border: selected ? `2px solid ${theme.highlight}` : `1px solid ${theme.border}`, background: selected ? (dark ? "rgba(232,152,90,0.15)" : "rgba(232,152,90,0.1)") : "transparent", color: selected ? theme.highlight : theme.textSec, fontSize: 13, fontWeight: selected ? 600 : 400, cursor: "pointer", transition: "all 0.15s" }}>{label}</button>
  );

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 160 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)", animation: "fadeIn 0.2s" }} />
      <div style={{ position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, maxHeight: "90vh", overflow: "auto", animation: "slideUp 0.3s ease-out", ...glassStyle(dark), borderRadius: "20px 20px 0 0", padding: "16px 20px 40px" }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: dark ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.15)", margin: "0 auto 12px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ fontSize: 20, fontWeight: 700, margin: 0, color: theme.text }}>🫖 V60 手冲助手</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><X size={20} color={theme.textSec} /></button>
        </div>

        {step === "setup" && (
          <div style={{ animation: "fadeIn 0.2s" }}>
            {/* Mode Toggle */}
            <div style={{ display: "flex", borderRadius: 12, overflow: "hidden", marginBottom: 16, border: `1px solid ${theme.border}` }}>
              {[["custom","⚙️ 自定义方案"],["champion","🏆 冠军方案"]].map(([m,label])=>(
                <button key={m} onClick={()=>setMode(m)} style={{ flex: 1, padding: "10px 0", background: mode===m ? `linear-gradient(135deg,${theme.primary},${theme.highlight})` : "transparent", color: mode===m ? "#fff" : theme.textSec, border: "none", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s" }}>{label}</button>
              ))}
            </div>

            {mode === "champion" ? (
              <div>
                {/* Champion Cards */}
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                  {CHAMP_RECIPES.map((c,i) => (
                    <div key={i} onClick={()=>setChampIdx(i)} style={{ ...glassStyle(dark), padding: 14, cursor: "pointer", border: champIdx===i ? `2px solid ${theme.highlight}` : `1px solid transparent`, transition: "all 0.2s" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: theme.text }}>{c.name}</span>
                        {champIdx===i && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10, background: theme.highlight, color: "#fff" }}>已选</span>}
                      </div>
                      <div style={{ fontSize: 11, color: theme.highlight, marginBottom: 4 }}>{c.title}</div>
                      <div style={{ fontSize: 11, color: theme.textSec }}>{c.dripper} · {c.dose}g : {c.water}g · {c.temp}</div>
                      {champIdx===i && (
                        <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${theme.border}`, fontSize: 12, color: theme.textSec, lineHeight: 1.5 }}>
                          <div style={{ fontWeight: 500, color: theme.text, marginBottom: 2 }}>🫘 {c.bean}</div>
                          <div>{c.technique}</div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div>
                <InputRow label="☕ 豆子品种">
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {VARIETIES.map(v => <Chip key={v} selected={variety===v} label={v} onClick={()=>setVariety(v)} />)}
                  </div>
                </InputRow>
                <InputRow label="🧪 处理方法">
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {PROCESSES.map(p => <Chip key={p} selected={process===p} label={p} onClick={()=>setProcess(p)} />)}
                  </div>
                </InputRow>
                <InputRow label="🔥 烘焙程度">
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {ROASTS.map(r => <Chip key={r} selected={roast===r} label={r} onClick={()=>setRoast(r)} />)}
                  </div>
                </InputRow>
                <InputRow label="⚖️ 粉重 (g)">
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    {[12,15,18,20].map(d => <Chip key={d} selected={dose===d} label={`${d}g`} onClick={()=>setDose(d)} />)}
                    <input type="number" value={dose} onChange={e=>setDose(Math.max(8,Math.min(30,+e.target.value||15)))} style={{ width: 60, padding: "6px 10px", borderRadius: 8, border: `1px solid ${theme.border}`, background: "transparent", color: theme.text, fontSize: 14, textAlign: "center" }} />
                  </div>
                </InputRow>
              </div>
            )}

            {/* Recipe Summary */}
            <div style={{ ...glassStyle(dark), padding: 14, marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: theme.highlight, marginBottom: 8 }}>📋 {mode==="champion"?"冠军":"推荐"}方案</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
                {[["水温",recipe.temp],["粉水比",recipe.ratio],["总水量",`${recipe.waterTotal}g`]].map(([l,v])=>(
                  <div key={l} style={{ textAlign: "center", padding: "8px 4px", borderRadius: 8, background: dark ? "rgba(255,255,255,0.04)" : "rgba(111,78,55,0.04)" }}>
                    <div style={{ fontSize: 11, color: theme.textSec }}>{l}</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: theme.text }}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 13, color: theme.text, marginBottom: 6, fontWeight: 500 }}>🎯 预期风味</div>
              <div style={{ fontSize: 13, color: theme.textSec, lineHeight: 1.6, marginBottom: 10 }}>
                {recipe.flavorHints.join("，")}
              </div>
              <div style={{ fontSize: 13, color: theme.text, marginBottom: 6, fontWeight: 500 }}>👅 品鉴方法</div>
              {recipe.tastingTips.map((t,i) => (
                <div key={i} style={{ fontSize: 12, color: theme.textSec, lineHeight: 1.5, paddingLeft: 12, position: "relative", marginBottom: 4 }}>
                  <span style={{ position: "absolute", left: 0 }}>{i+1}.</span>{t}
                </div>
              ))}
            </div>

            <button onClick={startBrew} style={{ width: "100%", padding: "16px", borderRadius: 14, background: `linear-gradient(135deg,${theme.primary},${theme.highlight})`, color: "#FFF", border: "none", fontSize: 16, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              ▶ 开始冲煮
            </button>
          </div>
        )}

        {(step === "brewing" || step === "done") && (
          <div style={{ animation: "fadeIn 0.2s" }}>
            {/* Timer Display */}
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ position: "relative", width: 160, height: 160, margin: "0 auto 12px" }}>
                <svg width={160} height={160} style={{ transform: "rotate(-90deg)" }}>
                  <circle cx={80} cy={80} r={72} fill="none" stroke={dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)"} strokeWidth={5} />
                  <circle cx={80} cy={80} r={72} fill="none" stroke={step==="done"?"#4CAF50":theme.highlight} strokeWidth={5} strokeLinecap="round" strokeDasharray={452.39} strokeDashoffset={452.39 * (1 - progress)} style={{ transition: "stroke-dashoffset 0.3s ease" }} />
                </svg>
                <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 700, color: theme.text, fontVariantNumeric: "tabular-nums" }}>{formatTime(seconds)}</div>
                  <div style={{ fontSize: 11, color: theme.textSec }}>/ {formatTime(recipe.totalTime)}</div>
                </div>
              </div>

              {/* Current Step Highlight */}
              {currentStep && (
                <div style={{ ...glassStyle(dark), padding: "12px 16px", marginBottom: 12 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: theme.highlight }}>{currentStep.label}</div>
                  <div style={{ fontSize: 13, color: theme.textSec, marginTop: 4 }}>{currentStep.detail}</div>
                </div>
              )}
              {step === "done" && (
                <div style={{ fontSize: 18, fontWeight: 700, color: "#4CAF50", marginBottom: 12 }}>☕ 冲煮完成！享用吧</div>
              )}

              {/* Controls */}
              <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 16 }}>
                {step !== "done" && (
                  <button onClick={() => setRunning(!running)} style={{ width: 56, height: 56, borderRadius: 28, background: running ? "rgba(255,82,82,0.15)" : `linear-gradient(135deg,${theme.primary},${theme.highlight})`, border: running ? "2px solid #FF5252" : "none", color: running ? "#FF5252" : "#FFF", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {running ? "⏸" : "▶"}
                  </button>
                )}
                <button onClick={reset} style={{ width: 56, height: 56, borderRadius: 28, background: "transparent", border: `1px solid ${theme.border}`, fontSize: 16, cursor: "pointer", color: theme.textSec }}>⟲</button>
              </div>
            </div>

            {/* Steps Timeline */}
            <div style={{ marginBottom: 8 }}>
              {recipe.steps.map((s, i) => {
                const isDone = seconds >= s.end;
                const isCurrent = seconds >= s.time && seconds < s.end;
                return (
                  <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, opacity: isDone ? 0.4 : isCurrent ? 1 : 0.65 }}>
                    <div style={{ width: 24, height: 24, borderRadius: 12, background: isDone ? "#4CAF50" : isCurrent ? theme.highlight : theme.border, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 600, flexShrink: 0 }}>
                      {isDone ? "✓" : i + 1}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: isCurrent ? 600 : 400, color: theme.text }}>{s.label}</div>
                      <div style={{ fontSize: 11, color: theme.textSec }}>{formatTime(s.time)} - {s.detail}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Post-brew tasting tips */}
            {step === "done" && (
              <div style={{ ...glassStyle(dark), padding: 14 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: theme.highlight, marginBottom: 6 }}>👅 品鉴参考</div>
                <div style={{ fontSize: 13, color: theme.textSec, lineHeight: 1.6, marginBottom: 6 }}>{recipe.flavorHints.join("，")}</div>
                {recipe.tastingTips.map((t,i) => (
                  <div key={i} style={{ fontSize: 12, color: theme.textSec, lineHeight: 1.5, marginBottom: 3 }}>• {t}</div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// COMPARE OVERLAY (Side-by-side coffee comparison)
// ============================================================
function CompareOverlay({ theme, dark, onClose, onSelect }) {
  const [selected, setSelected] = useState([null, null]);
  const [search, setSearch] = useState("");
  const [slot, setSlot] = useState(0);

  const results = search.trim() ? COFFEE_DB.filter(c => {
    const q = search.toLowerCase();
    return c.name.toLowerCase().includes(q) || c.name_en.toLowerCase().includes(q) || c.origin.country_zh?.includes(q) || c.keywords?.some(k => k.toLowerCase().includes(q));
  }).slice(0, 8) : [];

  const pick = (coffee) => {
    const newSel = [...selected];
    newSel[slot] = coffee;
    setSelected(newSel);
    setSearch("");
  };

  const a = selected[0], b = selected[1];
  const bothSelected = a && b;

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 160 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)", animation: "fadeIn 0.2s" }} />
      <div style={{ position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, maxHeight: "90vh", overflow: "auto", animation: "slideUp 0.3s ease-out", ...glassStyle(dark), borderRadius: "20px 20px 0 0", padding: "16px 20px 40px" }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: dark ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.15)", margin: "0 auto 16px" }} />

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ fontSize: 20, fontWeight: 700, margin: 0, color: theme.text }}>⚖️ 咖啡对比</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><X size={20} color={theme.textSec} /></button>
        </div>

        {/* Selection Slots */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
          {[0, 1].map(i => (
            <div key={i} onClick={() => setSlot(i)} style={{ padding: 14, borderRadius: 14, border: slot === i ? `2px solid ${theme.highlight}` : `1px solid ${theme.border}`, background: slot === i ? (dark ? "rgba(232,152,90,0.08)" : "rgba(232,152,90,0.05)") : "transparent", cursor: "pointer", textAlign: "center", minHeight: 80, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              {selected[i] ? (
                <>
                  <span style={{ fontSize: 22 }}>{selected[i].origin.flag}</span>
                  <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginTop: 4 }}>{selected[i].name}</div>
                  <div style={{ fontSize: 11, color: theme.textSec }}>{selected[i].process_zh}</div>
                </>
              ) : (
                <>
                  <Plus size={20} color={theme.textSec} />
                  <div style={{ fontSize: 13, color: theme.textSec, marginTop: 4 }}>选择咖啡 {i + 1}</div>
                </>
              )}
            </div>
          ))}
        </div>

        {/* Search */}
        <div style={{ position: "relative", marginBottom: 12 }}>
          <Search size={16} color={theme.textSec} style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder={`搜索咖啡 ${slot + 1}...`} style={{ width: "100%", padding: "10px 10px 10px 36px", borderRadius: 10, border: `1px solid ${theme.border}`, background: "transparent", color: theme.text, fontSize: 14, outline: "none" }} />
        </div>
        {results.map(c => (
          <div key={c.id} onClick={() => pick(c)} style={{ padding: "10px 12px", display: "flex", alignItems: "center", gap: 8, cursor: "pointer", borderBottom: `1px solid ${theme.border}` }}>
            <span style={{ fontSize: 18 }}>{c.origin.flag}</span>
            <span style={{ fontSize: 14, color: theme.text }}>{c.name}</span>
            <span style={{ fontSize: 12, color: theme.textSec, marginLeft: "auto" }}>{c.process_zh}</span>
          </div>
        ))}

        {/* Comparison Table */}
        {bothSelected && (
          <div style={{ marginTop: 16, animation: "fadeInUp 0.3s ease-out" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>对比结果</div>
            {[
              ["产地", a.origin.country_zh + " " + a.origin.region_zh, b.origin.country_zh + " " + b.origin.region_zh],
              ["海拔", a.origin.altitude, b.origin.altitude],
              ["品种", a.variety?.join(", "), b.variety?.join(", ")],
              ["处理法", a.process_zh, b.process_zh],
              ["烘焙度", a.roast_zh, b.roast_zh],
              ["醇厚度", a.body, b.body],
              ["酸质", a.acidity, b.acidity],
            ].map(([label, va, vb]) => (
              <div key={label} style={{ display: "grid", gridTemplateColumns: "1fr 60px 1fr", gap: 4, padding: "8px 0", borderBottom: `1px solid ${theme.border}` }}>
                <div style={{ fontSize: 13, color: theme.text, textAlign: "right" }}>{va}</div>
                <div style={{ fontSize: 11, color: theme.highlight, fontWeight: 600, textAlign: "center" }}>{label}</div>
                <div style={{ fontSize: 13, color: theme.text }}>{vb}</div>
              </div>
            ))}
            {/* Flavor comparison */}
            <div style={{ marginTop: 12 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 60px 1fr", gap: 4, padding: "8px 0" }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "flex-end" }}>
                  {a.flavor_notes.map(f => <span key={f} style={{ padding: "2px 8px", borderRadius: 12, fontSize: 11, background: dark ? "rgba(212,165,116,0.12)" : "rgba(212,165,116,0.15)", color: theme.highlight }}>{f}</span>)}
                </div>
                <div style={{ fontSize: 11, color: theme.highlight, fontWeight: 600, textAlign: "center" }}>风味</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {b.flavor_notes.map(f => <span key={f} style={{ padding: "2px 8px", borderRadius: 12, fontSize: 11, background: dark ? "rgba(212,165,116,0.12)" : "rgba(212,165,116,0.15)", color: theme.highlight }}>{f}</span>)}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// SCA FLAVOR WHEEL OVERLAY (3-layer interactive)
// ============================================================
function FlavorWheelOverlay({ theme, dark, onClose, onSelect }) {
  const [activeLayer, setActiveLayer] = useState(null);
  const [activeSlice, setActiveSlice] = useState(null);

  const WHEEL = [
    { name: "花香", color: "#E8B4BC", children: ["茉莉","玫瑰","橙花","白花","薰衣草","紫罗兰"] },
    { name: "果味", color: "#F4845F", children: ["柑橘","柠檬","蓝莓","草莓","蜜桃","百香果","芒果","苹果","葡萄","黑莓","红莓","樱桃"] },
    { name: "甜感", color: "#F6BD60", children: ["蜂蜜","焦糖","红糖","黑糖","太妃糖","巧克力","香草","奶油"] },
    { name: "坚果", color: "#A68A64", children: ["杏仁","榛果","核桃","花生","腰果"] },
    { name: "可可", color: "#6B4226", children: ["黑巧克力","牛奶巧克力","可可粉","可可脂"] },
    { name: "香料", color: "#C05746", children: ["肉桂","丁香","桂皮","胡椒","八角","豆蔻"] },
    { name: "草本", color: "#7BA05B", children: ["草药","薄荷","茶感","白茶","红茶","草本"] },
    { name: "烘焙", color: "#8B5E3C", children: ["烟熏","烤面包","焦糖化","烟草","烟丝","泥土"] },
    { name: "发酵", color: "#9B59B6", children: ["红酒","威士忌","酸奶","酒香","发酵水果","雪莉酒"] },
  ];

  const size = 300;
  const cx = size / 2, cy = size / 2;
  const innerR = 38, midR = 85, outerR = 138;

  // Active info content
  const activeInfo = activeLayer !== null ? (() => {
    const cat = WHEEL[activeLayer];
    let matchedFlavor = null, matches = [];
    if (activeSlice) {
      const [ci, cj] = activeSlice.split("-").map(Number);
      matchedFlavor = WHEEL[ci].children[cj];
      matches = COFFEE_DB.filter(c => c.flavor_notes?.some(f => f.includes(matchedFlavor))).slice(0, 4);
    }
    return { cat, matchedFlavor, matches };
  })() : null;

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 160, display: "flex", flexDirection: "column" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)", animation: "fadeIn 0.2s" }} />
      {/* Full-screen panel, flex layout so wheel stays put */}
      <div style={{ position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, height: "85vh", display: "flex", flexDirection: "column", animation: "slideUp 0.3s ease-out", ...glassStyle(dark), borderRadius: "20px 20px 0 0", overflow: "hidden" }}>
        {/* Header - fixed */}
        <div style={{ padding: "12px 20px 0", flexShrink: 0 }}>
          <div style={{ width: 36, height: 4, borderRadius: 2, background: dark ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.15)", margin: "0 auto 12px" }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <h3 style={{ fontSize: 20, fontWeight: 700, margin: 0, color: theme.text }}>🎡 SCA 风味轮</h3>
            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><X size={20} color={theme.textSec} /></button>
          </div>
          <div style={{ textAlign: "center", fontSize: 12, color: theme.textSec, marginBottom: 4 }}>点击内环选择类别 · 点击外环查看风味</div>
        </div>

        {/* Wheel - fixed height, never shifts */}
        <div style={{ flexShrink: 0, display: "flex", justifyContent: "center", padding: "8px 0" }}>
          <svg width={size} height={size} style={{ overflow: "visible" }}>
            <circle cx={cx} cy={cy} r={innerR} fill={dark ? "#2A2420" : "#F5E6D3"} stroke={theme.border} strokeWidth={1} />
            <text x={cx} y={cy - 4} textAnchor="middle" fontSize={13} fontWeight={700} fill={theme.text}>咖啡</text>
            <text x={cx} y={cy + 10} textAnchor="middle" fontSize={10} fill={theme.textSec}>风味轮</text>

            {WHEEL.map((cat, i) => {
              const angleStart = (i / WHEEL.length) * 360 - 90;
              const angleEnd = ((i + 1) / WHEEL.length) * 360 - 90;
              const startRad = (angleStart * Math.PI) / 180;
              const endRad = (angleEnd * Math.PI) / 180;
              const x1 = cx + innerR * Math.cos(startRad), y1 = cy + innerR * Math.sin(startRad);
              const x2 = cx + midR * Math.cos(startRad), y2 = cy + midR * Math.sin(startRad);
              const x3 = cx + midR * Math.cos(endRad), y3 = cy + midR * Math.sin(endRad);
              const x4 = cx + innerR * Math.cos(endRad), y4 = cy + innerR * Math.sin(endRad);
              const largeArc = angleEnd - angleStart > 180 ? 1 : 0;
              const midAngle = ((angleStart + angleEnd) / 2 * Math.PI) / 180;
              const labelR = (innerR + midR) / 2;
              const isActive = activeLayer === i;
              return (
                <g key={cat.name} onClick={() => { setActiveLayer(isActive ? null : i); setActiveSlice(null); }} style={{ cursor: "pointer" }}>
                  <path d={`M${x1},${y1} L${x2},${y2} A${midR},${midR} 0 ${largeArc} 1 ${x3},${y3} L${x4},${y4} A${innerR},${innerR} 0 ${largeArc} 0 ${x1},${y1}`} fill={cat.color} opacity={isActive ? 1 : 0.75} stroke={dark ? "#1A1410" : "#fff"} strokeWidth={1.5} style={{ transition: "opacity 0.2s" }} />
                  <text x={cx + labelR * Math.cos(midAngle)} y={cy + labelR * Math.sin(midAngle) + 4} textAnchor="middle" fontSize={10} fontWeight={600} fill="#fff" style={{ pointerEvents: "none" }}>{cat.name}</text>
                </g>
              );
            })}

            {WHEEL.map((cat, i) => {
              const catStart = (i / WHEEL.length) * 360 - 90;
              const catSpan = 360 / WHEEL.length;
              return cat.children.map((child, j) => {
                const subStart = catStart + (j / cat.children.length) * catSpan;
                const subEnd = catStart + ((j + 1) / cat.children.length) * catSpan;
                const sRad = (subStart * Math.PI) / 180, eRad = (subEnd * Math.PI) / 180;
                const x1 = cx + midR * Math.cos(sRad), y1 = cy + midR * Math.sin(sRad);
                const x2 = cx + outerR * Math.cos(sRad), y2 = cy + outerR * Math.sin(sRad);
                const x3 = cx + outerR * Math.cos(eRad), y3 = cy + outerR * Math.sin(eRad);
                const x4 = cx + midR * Math.cos(eRad), y4 = cy + midR * Math.sin(eRad);
                const largeArc = subEnd - subStart > 180 ? 1 : 0;
                const midAngle = ((subStart + subEnd) / 2 * Math.PI) / 180;
                const labelR = (midR + outerR) / 2;
                const isActiveChild = activeSlice === `${i}-${j}`;
                const showLabel = activeLayer === i || isActiveChild;
                return (
                  <g key={`${i}-${j}`} onClick={(e) => { e.stopPropagation(); setActiveSlice(isActiveChild ? null : `${i}-${j}`); setActiveLayer(i); }} style={{ cursor: "pointer" }}>
                    <path d={`M${x1},${y1} L${x2},${y2} A${outerR},${outerR} 0 ${largeArc} 1 ${x3},${y3} L${x4},${y4} A${midR},${midR} 0 ${largeArc} 0 ${x1},${y1}`} fill={cat.color} opacity={showLabel ? 0.9 : (activeLayer === null ? 0.5 : activeLayer === i ? 0.65 : 0.2)} stroke={dark ? "#1A1410" : "#fff"} strokeWidth={0.8} style={{ transition: "opacity 0.2s" }} />
                    {showLabel && <text x={cx + labelR * Math.cos(midAngle)} y={cy + labelR * Math.sin(midAngle) + 3} textAnchor="middle" fontSize={8} fontWeight={500} fill="#fff" style={{ pointerEvents: "none" }}>{child}</text>}
                  </g>
                );
              });
            })}
          </svg>
        </div>

        {/* Detail panel - scrollable, fixed area below wheel */}
        <div style={{ flex: 1, overflow: "auto", padding: "0 20px 32px", minHeight: 120 }}>
          {activeInfo ? (
            <div style={{ ...glassStyle(dark), padding: 14, animation: "fadeIn 0.15s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 12, height: 12, borderRadius: 6, background: activeInfo.cat.color }} />
                <span style={{ fontSize: 15, fontWeight: 600, color: theme.text }}>{activeInfo.cat.name}</span>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: activeInfo.matchedFlavor ? 10 : 0 }}>
                {activeInfo.cat.children.map((c, j) => (
                  <span key={c} onClick={() => setActiveSlice(activeSlice === `${activeLayer}-${j}` ? null : `${activeLayer}-${j}`)} style={{ padding: "4px 10px", borderRadius: 16, fontSize: 12, background: activeSlice === `${activeLayer}-${j}` ? activeInfo.cat.color : (dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.05)"), color: activeSlice === `${activeLayer}-${j}` ? "#fff" : theme.text, cursor: "pointer", transition: "all 0.15s" }}>{c}</span>
                ))}
              </div>
              {activeInfo.matchedFlavor && activeInfo.matches.length > 0 && (
                <div style={{ borderTop: `1px solid ${theme.border}`, paddingTop: 10 }}>
                  <div style={{ fontSize: 12, color: theme.textSec, marginBottom: 6 }}>包含「{activeInfo.matchedFlavor}」风味的咖啡</div>
                  {activeInfo.matches.map(c => (
                    <div key={c.id} onClick={() => { onClose(); setTimeout(() => onSelect?.(c), 100); }} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", cursor: "pointer" }}>
                      <span>{c.origin.flag}</span>
                      <span style={{ fontSize: 13, color: theme.text }}>{c.name}</span>
                      <span style={{ fontSize: 11, color: theme.textSec, marginLeft: "auto" }}>{c.process_zh}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: 20, color: theme.textSec, fontSize: 13 }}>
              选择一个风味类别查看详情
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
