const STORAGE_KEYS = { users: "coffee-lab:users", settings: "coffee-lab:settings" };
const userKey = (uid) => `coffee-lab:user:${uid}`;

async function loadStorage(key, fallback) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; }
  catch { return fallback; }
}
async function saveStorage(key, val) {
  try { await window.storage.set(key, JSON.stringify(val)); } catch(e) { console.error("Save error:", e); }
}

const defaultUserData = (name) => ({
  profile: { name, avatar: "☕", createdAt: new Date().toISOString() },
  records: [],
  achievements: [],
  favorites: [],
  unlockedCountries: [],
});

function CoffeeLab() {
  const [tab, setTab] = useState("home");
  const [dark, setDark] = useState(false);
  const [loading, setLoading] = useState(true);
  const [users, setUsers] = useState([]);
  const [currentUserId, setCurrentUserId] = useState(null);
  const [userData, setUserData] = useState(null);
  const [selectedCoffee, setSelectedCoffee] = useState(null);
  const [showRecord, setShowRecord] = useState(false);
  const [showNewUser, setShowNewUser] = useState(false);
  const [newAchievement, setNewAchievement] = useState(null);
  const [mapCountry, setMapCountry] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [showTimer, setShowTimer] = useState(false);
  const [showCompare, setShowCompare] = useState(false);
  const [showFlavorWheel, setShowFlavorWheel] = useState(false);
  const [lang, setLang] = useState("zh");
  const t = useCallback((key) => I18N[lang]?.[key] || I18N.zh[key] || key, [lang]);

  // Load data on mount
  useEffect(() => {
    (async () => {
      const settings = await loadStorage(STORAGE_KEYS.settings, { theme: "light", currentUserId: null });
      const userList = await loadStorage(STORAGE_KEYS.users, []);
      setDark(settings.theme === "dark");
      if (userList.length > 0) {
        setUsers(userList);
        const uid = settings.currentUserId || userList[0].id;
        setCurrentUserId(uid);
        const ud = await loadStorage(userKey(uid), defaultUserData(userList[0].name));
        setUserData(ud);
      }
      setLoading(false);
    })();
  }, []);

  // Save user data whenever it changes
  useEffect(() => {
    if (currentUserId && userData) {
      saveStorage(userKey(currentUserId), userData);
    }
  }, [userData, currentUserId]);

  // Save settings
  useEffect(() => {
    saveStorage(STORAGE_KEYS.settings, { theme: dark ? "dark" : "light", currentUserId });
  }, [dark, currentUserId]);

  const createUser = async (name) => {
    const id = `user-${Date.now()}`;
    const newUsers = [...users, { id, name }];
    setUsers(newUsers);
    await saveStorage(STORAGE_KEYS.users, newUsers);
    const ud = defaultUserData(name);
    setUserData(ud);
    setCurrentUserId(id);
    await saveStorage(userKey(id), ud);
    setShowNewUser(false);
  };

  const switchUser = async (uid) => {
    setCurrentUserId(uid);
    const ud = await loadStorage(userKey(uid), defaultUserData(""));
    setUserData(ud);
  };

  const addRecord = (record) => {
    const newRecords = [...(userData?.records || []), { ...record, id: `rec-${Date.now()}`, createdAt: new Date().toISOString() }];
    const newData = { ...userData, records: newRecords };
    // Check achievements
    const unlockedCountries = [...new Set(newRecords.map(r => COFFEE_DB.find(x => x.id === r.coffeeId)?.origin.country).filter(Boolean))];
    newData.unlockedCountries = unlockedCountries;
    // Check new achievements
    const currentAch = new Set(userData?.achievements || []);
    for (const ach of ACHIEVEMENTS) {
      if (!currentAch.has(ach.id) && ach.check(newData)) {
        newData.achievements = [...(newData.achievements || []), ach.id];
        setNewAchievement(ach);
        setTimeout(() => setNewAchievement(null), 3000);
      }
    }
    setUserData(newData);
    setShowRecord(false);
  };

  const toggleFavorite = (coffeeId) => {
    if (!userData) return;
    const favs = userData.favorites || [];
    const newFavs = favs.includes(coffeeId) ? favs.filter(f => f !== coffeeId) : [...favs, coffeeId];
    setUserData({ ...userData, favorites: newFavs });
  };

  const deleteRecord = (recId) => {
    if (!userData) return;
    const newRecords = userData.records.filter(r => r.id !== recId);
    const newData = { ...userData, records: newRecords };
    newData.unlockedCountries = [...new Set(newRecords.map(r => COFFEE_DB.find(x => x.id === r.coffeeId)?.origin.country).filter(Boolean))];
    setUserData(newData);
  };

  // Theme colors
  const theme = {
    bg: dark ? "#0D0B09" : "#FFF8F0",
    card: dark ? "#1A1410" : "#FFFFFF",
    text: dark ? "#F5F0EB" : "#1A1410",
    textSec: dark ? "#A89B8C" : "#8B7355",
    accent: "#D4A574",
    primary: "#6F4E37",
    highlight: "#E8985A",
    border: dark ? "rgba(255,255,255,0.06)" : "rgba(111,78,55,0.08)",
  };

  if (loading) {
    return (
      <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:theme.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif" }}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16,animation:"pulse 1.5s infinite"}}>☕</div>
          <div style={{color:theme.textSec,fontSize:14}}>Coffee Lab 加载中...</div>
        </div>
      </div>
    );
  }

  // No user yet
  if (users.length === 0 && !showNewUser) {
    return (
      <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:`linear-gradient(135deg, ${dark?"#0D0B09":"#FFF8F0"} 0%, ${dark?"#1A1410":"#F5E6D3"} 100%)`,fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif",padding:24 }}>
        <div style={{textAlign:"center",maxWidth:360}}>
          <div style={{fontSize:72,marginBottom:24}}>☕</div>
          <h1 style={{fontSize:32,fontWeight:800,background:`linear-gradient(135deg, ${theme.primary}, ${theme.highlight})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8,letterSpacing:"-0.03em"}}>Coffee Lab</h1>
          <p style={{color:theme.textSec,fontSize:15,marginBottom:40,lineHeight:1.6}}>{lang==="zh"?"探索世界精品咖啡":"Explore World Specialty Coffee"}<br/>{lang==="zh"?"记录你的咖啡旅程":"Record Your Coffee Journey"}</p>
          <button onClick={()=>setShowNewUser(true)} style={{background:`linear-gradient(135deg, ${theme.primary}, ${theme.highlight})`,color:"#FFF",border:"none",borderRadius:14,padding:"16px 48px",fontSize:17,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 20px rgba(111,78,55,0.3)",transition:"transform 0.15s",letterSpacing:"0.01em"}} onMouseDown={e=>e.target.style.transform="scale(0.97)"} onMouseUp={e=>e.target.style.transform="scale(1)"}>
            {lang==="zh"?"开始探索":"Get Started"}
          </button>
        </div>
      </div>
    );
  }

  if (showNewUser) {
    return <NewUserScreen onCreate={createUser} onCancel={()=>setShowNewUser(false)} theme={theme} dark={dark} />;
  }

  return (
    <div style={{ height:"100vh",display:"flex",flexDirection:"column",background:theme.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif",color:theme.text,maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden" }}>
      <style>{`
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(500px) rotate(720deg);opacity:0}}
        @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(212,165,116,0.3)}50%{box-shadow:0 0 40px rgba(212,165,116,0.6)}}
        @keyframes mapPulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.6);opacity:0.3}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
        * { box-sizing: border-box; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        input, textarea { font-family: inherit; }
      `}</style>

      {/* Main Content */}
      <div style={{ flex:1,overflow:"auto",paddingBottom:80 }}>
        {tab==="home" && <DashboardPage theme={theme} dark={dark} userData={userData} setTab={setTab} setSelectedCoffee={setSelectedCoffee} setShowTimer={setShowTimer} setShowCompare={setShowCompare} setShowFlavorWheel={setShowFlavorWheel} lang={lang} t={t} />}
        {tab==="identify" && <IdentifyPage theme={theme} dark={dark} userData={userData} searchQuery={searchQuery} setSearchQuery={setSearchQuery} setSelectedCoffee={setSelectedCoffee} lang={lang} t={t} />}
        {tab==="news" && <NewsPage theme={theme} dark={dark} lang={lang} t={t} />}
        {tab==="map" && <MapPage theme={theme} dark={dark} userData={userData} setMapCountry={setMapCountry} mapCountry={mapCountry} setSelectedCoffee={setSelectedCoffee} setTab={setTab} lang={lang} t={t} />}
        {tab==="profile" && <ProfilePage theme={theme} dark={dark} userData={userData} users={users} currentUserId={currentUserId} switchUser={switchUser} setShowNewUser={setShowNewUser} setDark={setDark} deleteRecord={deleteRecord} lang={lang} setLang={setLang} t={t} />}
      </div>

      {/* Tab Bar */}
      <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,...glassStyle(dark),borderRadius:"20px 20px 0 0",display:"flex",justifyContent:"space-around",padding:"8px 0 env(safe-area-inset-bottom, 8px)",zIndex:100 }}>
        {[
          {id:"home",icon:Home,label:t("home")},
          {id:"identify",icon:Search,label:t("identify")},
          {id:"news",icon:BookOpen,label:lang==="zh"?"资讯":"News"},
          {id:"map",icon:Globe,label:t("map")},
          {id:"profile",icon:User,label:t("profile")},
        ].map(tb=>(
          <button key={tb.id} onClick={()=>setTab(tb.id)} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 16px",cursor:"pointer",transition:"all 0.2s",opacity:tab===tb.id?1:0.45}}>
            <tb.icon size={22} color={tab===tb.id?theme.highlight:theme.text} strokeWidth={tab===tb.id?2.5:1.8} />
            <span style={{fontSize:10,fontWeight:tab===tb.id?600:400,color:tab===tb.id?theme.highlight:theme.text}}>{tb.label}</span>
          </button>
        ))}
      </div>

      {/* Coffee Detail Sheet */}
      {selectedCoffee && (
        <BottomSheet onClose={()=>{setSelectedCoffee(null);setShowRecord(false)}} theme={theme} dark={dark}>
          {!showRecord ? (
            <CoffeeCard coffee={selectedCoffee} theme={theme} dark={dark} lang={lang} isFav={userData?.favorites?.includes(selectedCoffee.id)} onFav={()=>toggleFavorite(selectedCoffee.id)} onRecord={()=>setShowRecord(true)} />
          ) : (
            <RecordForm coffee={selectedCoffee} theme={theme} dark={dark} lang={lang} onSave={addRecord} onCancel={()=>setShowRecord(false)} />
          )}
        </BottomSheet>
      )}

      {/* Achievement Toast with Confetti */}
      {newAchievement && (
        <>
          {/* Confetti particles */}
          {Array.from({length:24}).map((_,i)=>(
            <div key={i} style={{position:"fixed",top:-10,left:`${Math.random()*100}%`,width:8+Math.random()*8,height:8+Math.random()*8,borderRadius:Math.random()>0.5?"50%":"2px",background:["#FF7043","#66BB6A","#FFA726","#42A5F5","#AB47BC","#FFCA28","#E8985A","#D4A574"][i%8],zIndex:201,animation:`confetti ${1.5+Math.random()*1.5}s ease-out ${Math.random()*0.5}s forwards`,pointerEvents:"none"}} />
          ))}
          <div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",zIndex:200,animation:"fadeInUp 0.5s ease-out",...glassStyle(dark),padding:"16px 24px",display:"flex",alignItems:"center",gap:12,minWidth:280,boxShadow:"0 8px 40px rgba(212,165,116,0.4)"}}>
            <div style={{fontSize:36,animation:"pulse 0.8s ease-in-out infinite"}}>{newAchievement.icon}</div>
            <div>
              <div style={{fontSize:12,color:theme.highlight,fontWeight:600,letterSpacing:"0.05em"}}>{lang==="zh"?"🎉 成就解锁！":"🎉 Achievement Unlocked!"}</div>
              <div style={{fontSize:16,fontWeight:700,color:theme.text}}>{lang==="en"&&newAchievement.name_en?newAchievement.name_en:newAchievement.name}</div>
              <div style={{fontSize:12,color:theme.textSec,marginTop:2}}>{lang==="en"&&newAchievement.desc_en?newAchievement.desc_en:newAchievement.desc}</div>
            </div>
          </div>
        </>
      )}

      {/* Timer Overlay */}
      {showTimer && <TimerOverlay theme={theme} dark={dark} onClose={()=>setShowTimer(false)} />}

      {/* Comparison Overlay */}
      {showCompare && <CompareOverlay theme={theme} dark={dark} onClose={()=>setShowCompare(false)} onSelect={(c)=>{setShowCompare(false);setSelectedCoffee(c)}} />}

      {/* Flavor Wheel Overlay */}
      {showFlavorWheel && <FlavorWheelOverlay theme={theme} dark={dark} onClose={()=>setShowFlavorWheel(false)} onSelect={(c)=>{setShowFlavorWheel(false);setSelectedCoffee(c)}} />}
    </div>
  );
}

          {c.brew.espresso && <div style={{fontSize:13,color:theme.text}}>意式: {c.brew.espresso.dose} in / {c.brew.espresso.yield} out / {c.brew.espresso.time}</div>}

function RecordForm({ coffee, theme, dark, onSave, onCancel, lang }) {
  const [rating, setRating] = useState(4);
  const [brew, setBrew] = useState("pourover");
  const [notes, setNotes] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",padding:4}}>
          <ArrowLeft size={20} color={theme.text} />
        </button>
        <h3 style={{fontSize:18,fontWeight:600,margin:0,color:theme.text}}>{lang==="en"?"Record Tasting":"记录品鉴"} · {lang==="en"?coffee.name_en:coffee.name}</h3>
      </div>

      {/* Rating */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,color:theme.textSec,marginBottom:8}}>{lang==="en"?"Rating":"评分"}</div>
        <div style={{display:"flex",gap:8}}>
          {[1,2,3,4,5].map(i=>(
            <button key={i} onClick={()=>setRating(i)} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",opacity:i<=rating?1:0.25,transition:"all 0.15s",transform:i<=rating?"scale(1.1)":"scale(1)"}}>☕</button>

      {/* Brew Method */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,color:theme.textSec,marginBottom:8}}>{lang==="en"?"Brew Method":"冲煮方式"}</div>

          {BREW_METHODS.map(b=>(
            <button key={b.id} onClick={()=>setBrew(b.id)} style={{padding:"10px 8px",borderRadius:10,border:brew===b.id?`2px solid ${theme.highlight}`:`1px solid ${theme.border}`,background:brew===b.id?(dark?"rgba(232,152,90,0.12)":"rgba(232,152,90,0.08)"):"transparent",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:20}}>{b.icon}</div>
              <div style={{fontSize:12,color:brew===b.id?theme.highlight:theme.textSec,marginTop:2,fontWeight:brew===b.id?600:400}}>{b.name}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Date */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,color:theme.textSec,marginBottom:8}}>{lang==="en"?"Date":"日期"}</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1px solid ${theme.border}`,background:"transparent",color:theme.text,fontSize:15}} />
      </div>

      {/* Notes */}
      <div style={{marginBottom:24}}>
        <div style={{fontSize:13,color:theme.textSec,marginBottom:8}}>{lang==="en"?"Tasting Notes (optional)":"品鉴笔记（选填）"}</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder={lang==="en"?"Your tasting impressions...":"记录你的品鉴感受..."} rows={3} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${theme.border}`,background:"transparent",color:theme.text,fontSize:14,resize:"none",outline:"none",lineHeight:1.5}} />
      </div>

      <button onClick={()=>onSave({coffeeId:coffee.id,rating,brewMethod:brew,notes,date})} style={{width:"100%",padding:"14px",borderRadius:12,background:`linear-gradient(135deg,${theme.primary},${theme.highlight})`,color:"#FFF",border:"none",fontSize:16,fontWeight:600,cursor:"pointer"}}>
        {lang==="en"?"Save Record":"保存记录"}
      </button>
    </div>
  );
}

// DASHBOARD PAGE
// ============================================================
function DashboardPage({ theme, dark, userData, setTab, setSelectedCoffee, setShowTimer, setShowCompare, setShowFlavorWheel, lang, t }) {
  const records = userData?.records || [];
  const countries = new Set(records.map(r => COFFEE_DB.find(x => x.id === r.coffeeId)?.origin.country).filter(Boolean));
  const achievements = userData?.achievements || [];
  const thisMonth = records.filter(r => r.date?.startsWith(new Date().toISOString().slice(0,7)));
  const [tipIdx] = useState(() => { const d = new Date(); return (d.getFullYear() * 366 + d.getMonth() * 31 + d.getDate()) % COFFEE_KNOWLEDGE.length; });

  const tastedIds = new Set(records.map(r => r.coffeeId));
  const unTasted = COFFEE_DB.filter(c => !tastedIds.has(c.id));
  const recommended = unTasted.length > 0 ? unTasted[Math.floor(Math.random() * unTasted.length)] : null;

  const stats = [
    { label: lang==="zh"?"已品鉴":"Cups", value: records.length, icon: "☕" },
    { label: lang==="zh"?"探索国家":"Origins", value: countries.size, icon: "🌍" },
    { label: lang==="zh"?"成就":"Badges", value: achievements.length, icon: "🏆" },
    { label: lang==="zh"?"本月":"Month", value: thisMonth.length, icon: "📅" },
  ];

  return (
    <div style={{ padding: "20px 20px 0" }}>
      {/* Header: Avatar + Name + Coffee Lab branding */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 40, height: 40, borderRadius: 20, background: `linear-gradient(135deg,${theme.primary},${theme.highlight})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>
            {userData?.profile?.avatar || "☕"}
          </div>
          <div>
            <div style={{ fontSize: 12, color: theme.textSec }}>{lang==="zh"?"欢迎回来":"Welcome back"}</div>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.02em" }}>{userData?.profile?.name || (lang==="zh"?"咖啡探索者":"Explorer")}</div>
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 15, fontWeight: 800, background: `linear-gradient(135deg,${theme.primary},${theme.highlight})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: "-0.02em" }}>Coffee Lab</div>
          <div style={{ fontSize: 9, color: theme.textSec }}>☕ {COFFEE_DB.length} {lang==="zh"?"款":"coffees"}</div>
        </div>
      </div>

      {/* Coffee Knowledge - daily tip */}
      <div style={{ ...glassStyle(dark), padding: 12, marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: theme.highlight }}>💡 {t("coffeeKnowledge")}</span>
        </div>
        <div style={{ fontSize: 12, color: theme.text, lineHeight: 1.6 }}>{COFFEE_KNOWLEDGE[tipIdx][lang] || COFFEE_KNOWLEDGE[tipIdx].zh}</div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 16 }}>
        {stats.map((s, i) => (
          <div key={s.label} style={{ ...glassStyle(dark), padding: "12px 6px", textAlign: "center", animation: `fadeInUp 0.4s ease-out ${i * 0.08}s both` }}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>{s.icon}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: theme.text }}>{s.value}</div>
            <div style={{ fontSize: 10, color: theme.textSec }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Quick Action */}
      <button onClick={() => setTab("identify")} style={{ width: "100%", padding: "14px", borderRadius: 14, background: `linear-gradient(135deg,${theme.primary},${theme.highlight})`, color: "#FFF", border: "none", fontSize: 15, fontWeight: 600, cursor: "pointer", marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: "0 4px 20px rgba(111,78,55,0.25)" }}>
        <Search size={18} /> {lang==="zh"?"识别一杯咖啡":"Identify Coffee"}
      </button>

      {/* Quick Tools */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 16 }}>
        {[
          { icon: "⏱️", label: t("timer"), action: () => setShowTimer(true) },
          { icon: "⚖️", label: t("compare"), action: () => setShowCompare(true) },
          { icon: "🎡", label: t("flavorWheel"), action: () => setShowFlavorWheel(true) },
        ].map((tool, i) => (
          <button key={tool.label} onClick={tool.action} style={{ ...glassStyle(dark), padding: "12px 8px", border: "none", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 20, marginBottom: 2 }}>{tool.icon}</div>
            <div style={{ fontSize: 11, fontWeight: 500, color: theme.text }}>{tool.label}</div>
          </button>
        ))}
      </div>

      {/* Recommendation */}
      {recommended && (
        <div style={{ ...glassStyle(dark), padding: 14, marginBottom: 16, cursor: "pointer" }} onClick={() => setSelectedCoffee(recommended)}>
          <div style={{ fontSize: 11, color: theme.highlight, fontWeight: 600, marginBottom: 6 }}>✨ {lang==="zh"?"今日推荐":"Today's Pick"}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 28 }}>{recommended.origin.flag}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: theme.text }}>{lang==="zh"?recommended.name:recommended.name_en}</div>
              <div style={{ fontSize: 12, color: theme.textSec }}>{recommended.flavor_notes.slice(0, 3).join(" · ")}</div>
            </div>
            <ChevronRight size={18} color={theme.textSec} />
          </div>
        </div>
      )}

      {/* Recent Records */}
      {records.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: theme.text }}>{t("recentRecords")}</div>
          {records.slice(-3).reverse().map((r, i) => {
            const c = COFFEE_DB.find(x => x.id === r.coffeeId);
            if (!c) return null;
            return (
              <div key={r.id} style={{ ...glassStyle(dark), padding: 12, marginBottom: 6, display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => setSelectedCoffee(c)}>
                <span style={{ fontSize: 22 }}>{c.origin.flag}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: theme.text }}>{lang==="zh"?c.name:c.name_en}</div>
                  <div style={{ fontSize: 11, color: theme.textSec }}>{r.date} · {BREW_METHODS.find(b => b.id === r.brewMethod)?.icon} {BREW_METHODS.find(b => b.id === r.brewMethod)?.name}</div>
                </div>
                <div style={{ fontSize: 12, color: theme.highlight }}>{"☕".repeat(r.rating)}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// IDENTIFY PAGE

function IdentifyPage({ theme, dark, userData, searchQuery, setSearchQuery, setSelectedCoffee, lang, t }) {
  const [imgMode, setImgMode] = useState(false);
  const [imgLoading, setImgLoading] = useState(false);
  const [imgResult, setImgResult] = useState(null);
  const [imgError, setImgError] = useState(null);
  const fileRef = useRef(null);

  const results = useMemo(() => {
    if (!searchQuery.trim()) return [];
    const q = searchQuery.toLowerCase();
    return COFFEE_DB.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.name_en.toLowerCase().includes(q) ||
      c.origin.country_zh?.includes(q) ||
      c.origin.region_zh?.includes(q) ||
      c.process_zh?.includes(q) ||
      c.variety?.some(v => v.toLowerCase().includes(q)) ||
      c.keywords?.some(k => k.toLowerCase().includes(q)) ||
      c.flavor_notes?.some(f => f.includes(q))
    ).slice(0, 20);
  }, [searchQuery]);

  const popular = useMemo(() => {
    const shuffled = [...COFFEE_DB].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, 6);
  }, []);

  const handleImageUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImgLoading(true);
    setImgError(null);
    setImgResult(null);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("Read failed"));
        r.readAsDataURL(file);
      });
      const mediaType = file.type || "image/jpeg";
      const coffeeNames = COFFEE_DB.map(c => `${c.name}(${c.name_en})`).join("、");
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: `你是一位咖啡鉴赏专家。请识别这张图片中的咖啡。如果能识别出具体的咖啡豆或品种，请返回JSON格式：{"identified":true,"name":"咖啡名称","name_en":"英文名","confidence":"high/medium/low","description":"简要描述"}。如果无法识别，返回：{"identified":false,"description":"描述你看到的内容和建议"}。已知咖啡数据库包含：${coffeeNames.slice(0,800)}。只返回JSON，不要其他内容。` }
            ]
          }],
        })
      });
      const data = await response.json();
      const text = data.content?.map(i => i.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setImgResult(parsed);
      // Try to match to DB
      if (parsed.identified && parsed.name) {
        const q = (parsed.name + " " + (parsed.name_en || "")).toLowerCase();
        const match = COFFEE_DB.find(c =>
          c.name.includes(parsed.name) || c.name_en.toLowerCase().includes(q) ||
          q.includes(c.name.toLowerCase()) || q.includes(c.name_en.toLowerCase())
        );
        if (match) setImgResult(prev => ({ ...prev, matchedCoffee: match }));
      }
    } catch (err) {
      setImgError(lang==="en"?"Recognition failed, try text search":"识别失败，请重试或使用文字搜索");
      console.error(err);
    }
    setImgLoading(false);
  };

  return (
    <div style={{ padding: "20px 20px 0" }}>
      <h2 style={{ fontSize: 26, fontWeight: 700, marginBottom: 20, letterSpacing: "-0.02em" }}>{lang==="en"?"Coffee Search":"识别咖啡"}</h2>

      {/* Mode Toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button onClick={() => setImgMode(false)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${!imgMode ? theme.highlight : theme.border}`, background: !imgMode ? (dark ? "rgba(232,152,90,0.12)" : "rgba(232,152,90,0.08)") : "transparent", color: !imgMode ? theme.highlight : theme.textSec, fontSize: 14, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
          <Search size={16} /> {lang==="en"?"Text Search":"文字搜索"}
        </button>
        <button onClick={() => setImgMode(true)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${imgMode ? theme.highlight : theme.border}`, background: imgMode ? (dark ? "rgba(232,152,90,0.12)" : "rgba(232,152,90,0.08)") : "transparent", color: imgMode ? theme.highlight : theme.textSec, fontSize: 14, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
          <Camera size={16} /> {lang==="en"?"Photo ID":"图片识别"}
        </button>
      </div>

      {imgMode ? (
        <div>
          {/* Image Upload Area */}
          <div onClick={() => fileRef.current?.click()} style={{ ...glassStyle(dark), padding: 40, textAlign: "center", cursor: "pointer", marginBottom: 16, border: `2px dashed ${theme.border}`, borderRadius: 16, transition: "all 0.2s" }}>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleImageUpload} style={{ display: "none" }} />
            {imgLoading ? (
              <div>
                <div style={{ width: 40, height: 40, border: `3px solid ${theme.border}`, borderTop: `3px solid ${theme.highlight}`, borderRadius: "50%", margin: "0 auto 12px", animation: "spin 0.8s linear infinite" }} />
                <div style={{ fontSize: 14, color: theme.textSec }}>AI 识别中...</div>
              </div>
            ) : (
              <>
                <Camera size={36} color={theme.textSec} style={{ marginBottom: 12 }} />
                <div style={{ fontSize: 15, color: theme.text, fontWeight: 500 }}>拍照或上传咖啡图片</div>
                <div style={{ fontSize: 13, color: theme.textSec, marginTop: 6 }}>支持咖啡豆、包装袋、咖啡杯等</div>
              </>
            )}
          </div>

          {/* Image Result */}
          {imgError && (
            <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16, borderLeft: "3px solid #FF5252" }}>
              <div style={{ fontSize: 14, color: "#FF5252" }}>{imgError}</div>
            </div>
          )}
          {imgResult && (
            <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16, animation: "fadeInUp 0.3s ease-out" }}>
              <div style={{ fontSize: 12, color: theme.highlight, fontWeight: 600, marginBottom: 8 }}>
                {imgResult.identified ? (lang==="en"?"✅ Identified":"✅ 识别成功") : (lang==="en"?"🔍 Result":"🔍 识别结果")}
                {imgResult.confidence && <span style={{ marginLeft: 8, opacity: 0.7 }}>{lang==="en"?"Confidence":"置信度"}: {imgResult.confidence === "high" ? (lang==="en"?"High":"高") : imgResult.confidence === "medium" ? (lang==="en"?"Med":"中") : (lang==="en"?"Low":"低")}</span>}
              </div>
              {imgResult.identified && (
                <div style={{ fontSize: 18, fontWeight: 700, color: theme.text, marginBottom: 6 }}>{imgResult.name}</div>
              )}
              <div style={{ fontSize: 14, color: theme.textSec, lineHeight: 1.6 }}>{imgResult.description}</div>
              {imgResult.matchedCoffee && (
                <button onClick={() => setSelectedCoffee(imgResult.matchedCoffee)} style={{ marginTop: 12, width: "100%", padding: "12px", borderRadius: 10, background: `linear-gradient(135deg,${theme.primary},${theme.highlight})`, color: "#FFF", border: "none", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                  {imgResult.matchedCoffee.origin.flag} {lang==="en"?`View ${imgResult.matchedCoffee.name_en}`:`查看 ${imgResult.matchedCoffee.name} 详情`} <ChevronRight size={16} />
                </button>
              )}
            </div>
          )}
        </div>
      ) : (
        <>
          {/* Search */}
          <div style={{ position: "relative", marginBottom: 20 }}>
            <Search size={18} color={theme.textSec} style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }} />
            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder={lang==="zh"?"搜索咖啡豆名称、产地、品种...":"Search by name, origin, variety..."} style={{ width: "100%", padding: "14px 14px 14px 42px", borderRadius: 14, border: `1px solid ${theme.border}`, background: dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.03)", color: theme.text, fontSize: 15, outline: "none" }} />
            {searchQuery && (
              <button onClick={() => setSearchQuery("")} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                <X size={16} color={theme.textSec} />
              </button>
            )}
          </div>

          {/* Results */}
          {searchQuery.trim() ? (
            <div>
              <div style={{ fontSize: 13, color: theme.textSec, marginBottom: 12 }}>
                {results.length > 0 ? (lang==="en"?`Found ${results.length} coffees`:`找到 ${results.length} 款咖啡`) : (lang==="en"?"No matching coffee found":"未找到匹配的咖啡")}
              </div>
              {results.map((c, i) => (
                <div key={c.id} onClick={() => setSelectedCoffee(c)} style={{ ...glassStyle(dark), padding: 14, marginBottom: 8, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", animation: `fadeInUp 0.3s ease-out ${i * 0.04}s both` }}>
                  <span style={{ fontSize: 28 }}>{c.origin.flag}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: theme.text }}>{lang==="en"?c.name_en:c.name}</div>
                    <div style={{ fontSize: 12, color: theme.textSec }}>{lang==="en"?c.origin.country:c.origin.country_zh} · {lang==="en"?c.process:c.process_zh} · {lang==="en"?c.roast:c.roast_zh}</div>
                    <div style={{ fontSize: 12, color: theme.highlight, marginTop: 2 }}>{c.flavor_notes.slice(0, 3).join(" · ")}</div>
                  </div>
                  <ChevronRight size={16} color={theme.textSec} />
                </div>
              ))}
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: theme.text }}>{lang==="en"?"Popular Coffees":"热门咖啡"}</div>
              {popular.map((c, i) => (
                <div key={c.id} onClick={() => setSelectedCoffee(c)} style={{ ...glassStyle(dark), padding: 14, marginBottom: 8, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", animation: `fadeInUp 0.3s ease-out ${i * 0.04}s both` }}>
                  <span style={{ fontSize: 28 }}>{c.origin.flag}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: theme.text }}>{lang==="en"?c.name_en:c.name}</div>
                    <div style={{ fontSize: 12, color: theme.textSec }}>{lang==="en"?c.origin.country:c.origin.country_zh} · {lang==="en"?c.process:c.process_zh}</div>
                  </div>
                  <ChevronRight size={16} color={theme.textSec} />
                </div>
              ))}
              <div style={{ textAlign: "center", padding: 24, color: theme.textSec, fontSize: 13 }}>
                {lang==="en"?`${COFFEE_DB.length} coffees to explore`:`共 ${COFFEE_DB.length} 款咖啡可供探索`}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function MapPage({ theme, dark, userData, setMapCountry, mapCountry, setSelectedCoffee, setTab, lang, t }) {
  const svgRef = useRef(null);
  const [dims, setDims] = useState({w: 400, h: 320});
  const unlocked = new Set(userData?.unlockedCountries || []);
  const progress = unlocked.size;
  const [pulseR, setPulseR] = useState(7);
  const total = COUNTRIES.length;

  // Globe rotation state (longitude, latitude)
  const [rot, setRot] = useState([-105, -15]);
  const [zoom, setZoom] = useState(1);
  const dragRef = useRef({dragging:false,startX:0,startY:0,startRot:[0,0]});

  useEffect(() => {
    if (!svgRef.current) return;
    const container = svgRef.current.parentElement;
    if (container) {
      const w = container.clientWidth - 16;
      setDims({w, h: Math.min(w * 0.75, 340)});
    }
  }, []);

  useEffect(() => {
    let frame = 0;
    const id = setInterval(() => { frame = (frame + 1) % 60; setPulseR(7 + Math.sin(frame / 60 * Math.PI * 2) * 7); }, 50);
    return () => clearInterval(id);
  }, []);

  // Globe drag = rotation
  const onPointerDown = useCallback((e) => {
    dragRef.current = {dragging:true, startX:e.clientX, startY:e.clientY, startRot:[...rot]};
    e.currentTarget.setPointerCapture(e.pointerId);
  }, [rot]);
  const onPointerMove = useCallback((e) => {
    if (!dragRef.current.dragging) return;
    const sens = 0.4 / zoom;
    const dx = (e.clientX - dragRef.current.startX) * sens;
    const dy = (e.clientY - dragRef.current.startY) * sens;
    setRot([dragRef.current.startRot[0] - dx, Math.max(-60, Math.min(60, dragRef.current.startRot[1] + dy))]);
  }, [zoom]);
  const onPointerUp = useCallback(() => { dragRef.current.dragging = false; }, []);
  const onWheel = useCallback((e) => { e.preventDefault(); setZoom(z => Math.max(0.8, Math.min(5, z * (e.deltaY < 0 ? 1.15 : 0.87)))); }, []);
  // Pinch zoom
  const touchRef = useRef({dist:0});
  const onTouchStart2 = useCallback((e) => { if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;touchRef.current.dist=Math.sqrt(dx*dx+dy*dy)} }, []);
  const onTouchMove2 = useCallback((e) => { if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);if(touchRef.current.dist>0)setZoom(z=>Math.max(0.8,Math.min(5,z*(dist/touchRef.current.dist))));touchRef.current.dist=dist} }, []);

  const R = Math.min(dims.w, dims.h) / 2.15 * zoom;

          <span style={{ fontSize: 11, fontWeight: 600, color: theme.highlight }}>{Math.round(progress / total * 100)}%</span>
        </div>
        <div style={{ height: 4, borderRadius: 2, background: dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)" }}>
          <div style={{ height: 4, borderRadius: 2, background: `linear-gradient(90deg,${theme.primary},${theme.highlight})`, width: `${progress / total * 100}%`, transition: "width 0.5s ease-out" }} />
        </div>
      </div>

      {/* Globe */}
      <div style={{ ...glassStyle(dark), padding: 6, marginBottom: 12, overflow: "hidden", position: "relative", touchAction: "none", borderRadius: 16 }}>
        {/* Zoom controls */}
        <div style={{ position: "absolute", top: 8, right: 8, zIndex: 5, display: "flex", flexDirection: "column", gap: 3 }}>
          <button onClick={() => setZoom(z => Math.min(5, z * 1.3))} style={{ width: 26, height: 26, borderRadius: 6, border: `1px solid ${theme.border}`, background: dark ? "rgba(30,30,30,0.85)" : "rgba(255,255,255,0.85)", color: theme.text, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          <button onClick={() => setZoom(z => Math.max(0.8, z * 0.77))} style={{ width: 26, height: 26, borderRadius: 6, border: `1px solid ${theme.border}`, background: dark ? "rgba(30,30,30,0.85)" : "rgba(255,255,255,0.85)", color: theme.text, fontSize: 15, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
          {(zoom !== 1) && <button onClick={() => {setZoom(1);setRot([-105,-15])}} style={{ width: 26, height: 26, borderRadius: 6, border: `1px solid ${theme.border}`, background: dark ? "rgba(30,30,30,0.85)" : "rgba(255,255,255,0.85)", color: theme.text, fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>⟲</button>}
        </div>
        <svg ref={svgRef} width={dims.w} height={dims.h} style={{ display: "block", cursor: dragRef.current.dragging ? "grabbing" : "grab" }}
          onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
          onWheel={onWheel} onTouchStart={onTouchStart2} onTouchMove={onTouchMove2}>
          {/* Globe background sphere */}
          <circle cx={cx} cy={cy} r={R} fill={dark ? "rgba(20,28,40,0.6)" : "rgba(220,235,245,0.5)"} stroke={dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"} strokeWidth={1} />

          {/* Graticule */}
          <path d={pathGen(graticuleGeo)} fill="none" stroke={dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)"} strokeWidth={0.4} />

          {/* Coffee Belt */}
          <path d={pathGen({type:"Feature",geometry:{type:"Polygon",coordinates:[[...Array.from({length:73},(_,i)=>[i*5-180,23.5]),...Array.from({length:73},(_,i)=>[(72-i)*5-180,-23.5])]]}}) || ""} fill={dark ? "rgba(212,165,116,0.08)" : "rgba(212,165,116,0.12)"} stroke="none" />

          {/* Continents */}
          {landFeatures.map(f => {
            const d = pathGen(f);
            if (!d) return null;
            const isChina = f.properties.id === "china";
            return <path key={f.properties.id} d={d}
              fill={isChina ? (dark ? "rgba(229,57,53,0.18)" : "rgba(229,57,53,0.12)") : (dark ? "rgba(140,160,180,0.12)" : "rgba(80,110,60,0.08)")}
              stroke={isChina ? (dark ? "rgba(229,57,53,0.5)" : "rgba(229,57,53,0.4)") : (dark ? "rgba(200,210,220,0.2)" : "rgba(60,90,50,0.18)")}
              strokeWidth={isChina ? 1.2 : 0.6} strokeLinejoin="round" />;
          })}

          {/* Country markers */}
          {COUNTRIES.map(ct => {
            const p = projection([ct.lng, ct.lat]);
            if (!p) return null;
            // Check if point is on visible hemisphere
            const dist = d3.geoDistance([ct.lng, ct.lat], [-rot[0], -rot[1]]);
            if (dist > Math.PI / 2) return null;
            const [x, y] = p;
            const isUnlocked = unlocked.has(ct.country);
            const isSelected = mapCountry?.country === ct.country;
            return (
              <g key={ct.country} onClick={(e) => {e.stopPropagation(); setMapCountry(isSelected ? null : ct)}} style={{ cursor: "pointer" }}>
                {isUnlocked && <circle cx={x} cy={y} r={pulseR * 0.8} fill="none" stroke={ct.color} strokeWidth={1} opacity={Math.max(0, 0.5 - (pulseR - 7) / 20)} />}
                <circle cx={x} cy={y} r={isSelected ? 7 : 5} fill={isUnlocked ? ct.color : (dark ? "#555" : "#bbb")} stroke={isSelected ? "#fff" : (dark ? "rgba(0,0,0,0.3)" : "rgba(255,255,255,0.8)")} strokeWidth={isSelected ? 2 : 1} />
                {!isUnlocked && <text x={x} y={y + 1} textAnchor="middle" dominantBaseline="middle" fontSize={6} fill={dark ? "#888" : "#999"}>🔒</text>}
                {(zoom >= 1.2 || isSelected) && <text x={x} y={y + 14} textAnchor="middle" fontSize={7} fontWeight={600} fill={isUnlocked ? (dark ? "#ccc" : "#555") : (dark ? "#555" : "#aaa")}>{ct.flag} {lang==="zh"?ct.zh:ct.country}</text>}
              </g>
            );
          })}
        </svg>
        <div style={{ position: "absolute", bottom: 6, left: 10, fontSize: 9, color: theme.textSec, opacity: 0.5 }}>{lang==="zh"?"拖动旋转 · 滚轮缩放":"Drag to rotate · Scroll to zoom"}</div>
      </div>

      {/* Country Detail */}
      {mapCountry && (
        <div style={{ ...glassStyle(dark), padding: 14, marginBottom: 12, animation: "fadeInUp 0.3s ease-out" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 26 }}>{mapCountry.flag}</span>
            <div style={{flex:1}}>
              <div style={{ fontSize: 16, fontWeight: 700, color: theme.text }}>{lang==="zh"?mapCountry.zh:mapCountry.country}</div>
              <div style={{ fontSize: 11, color: theme.textSec }}>{lang==="zh"?mapCountry.country:mapCountry.zh} · {mapCountry.continent}</div>
            </div>
            <span style={{ padding: "3px 8px", borderRadius: 10, background: unlocked.has(mapCountry.country) ? "rgba(76,175,80,0.15)" : "rgba(120,144,156,0.15)", color: unlocked.has(mapCountry.country) ? "#4CAF50" : "#78909C", fontSize: 11, fontWeight: 600 }}>
              {unlocked.has(mapCountry.country) ? "✓" : "🔒"}
            </span>
          </div>
          <div style={{ fontSize: 12, color: theme.textSec, lineHeight: 1.7, marginBottom: 10 }}>{(lang==="en" && mapCountry.info_en) ? mapCountry.info_en : mapCountry.info}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 10 }}>
            <div style={{ padding: "6px 8px", borderRadius: 8, background: dark ? "rgba(255,255,255,0.04)" : "rgba(111,78,55,0.04)" }}>
              <div style={{ fontSize: 9, color: theme.textSec }}>{lang==="zh"?"可选豆种":"Coffees"}</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: theme.highlight }}>{countryCoffees.length} {lang==="zh"?"款":"types"}</div>
            </div>
            <div style={{ padding: "6px 8px", borderRadius: 8, background: dark ? "rgba(255,255,255,0.04)" : "rgba(111,78,55,0.04)" }}>
              <div style={{ fontSize: 9, color: theme.textSec }}>{lang==="zh"?"品种":"Varieties"}</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: theme.text }}>{[...new Set(countryCoffees.flatMap(c=>c.variety||[]))].slice(0,3).join(", ")}</div>
            </div>
          </div>
          {unlocked.has(mapCountry.country) ? (
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: theme.text, marginBottom: 6 }}>{lang==="zh"?"该产地咖啡":"Coffees from this origin"}</div>
              {countryCoffees.map(c => (
                <div key={c.id} onClick={() => setSelectedCoffee(c)} style={{ padding: "8px 0", borderBottom: `1px solid ${theme.border}`, cursor: "pointer" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div>
                      <span style={{ fontSize: 13, fontWeight: 600, color: theme.text }}>{lang==="zh"?c.name:c.name_en}</span>
                      <span style={{ fontSize: 11, color: theme.textSec, marginLeft: 6 }}>{lang==="zh"?c.process_zh:c.process}</span>
                    </div>
                    <ChevronRight size={14} color={theme.textSec} />
                  </div>
                  <div style={{ display: "flex", gap: 3, marginTop: 3, flexWrap: "wrap" }}>
                    {c.flavor_notes.slice(0,4).map(f => (
                      <span key={f} style={{ fontSize: 9, padding: "1px 5px", borderRadius: 6, background: dark ? "rgba(212,165,116,0.1)" : "rgba(212,165,116,0.12)", color: theme.highlight }}>{f}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: 10, color: theme.textSec, fontSize: 12 }}>
              {lang==="zh"?`品鉴一杯来自${mapCountry.zh}的咖啡即可解锁 🔓`:`Taste a coffee from ${mapCountry.country} to unlock 🔓`}
            </div>
          )}
        </div>
      )}

      {/* Country Grid */}
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: theme.text }}>{t("allOrigins")} ({total})</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 5, marginBottom: 20 }}>
        {COUNTRIES.map(ct => (
          <div key={ct.country} onClick={() => flyTo(ct)} style={{ ...glassStyle(dark), padding: 7, textAlign: "center", cursor: "pointer", opacity: unlocked.has(ct.country) ? 1 : 0.5, transition: "all 0.2s", border: mapCountry?.country===ct.country ? `2px solid ${theme.highlight}` : "1px solid transparent" }}>
            <div style={{ fontSize: 16 }}>{ct.flag}</div>
            <div style={{ fontSize: 9, fontWeight: 500, color: theme.text, marginTop: 2, lineHeight: 1.2 }}>{lang==="zh"?ct.zh:ct.country}</div>
            {unlocked.has(ct.country) ? <div style={{ fontSize: 8, color: "#4CAF50", marginTop: 1 }}>✓</div> : <div style={{ fontSize: 8, color: theme.textSec, marginTop: 1 }}>🔒</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function NewsPage({ theme, dark, lang, t }) {
  const [expanded, setExpanded] = useState(null);
  const [liveNews, setLiveNews] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastFetch, setLastFetch] = useState(0);

  // Static curated articles (always shown as fallback / baseline)
  const CURATED = [
    {id:"c1",cat:lang==="zh"?"🏆 赛事":"🏆 Events",date:"2025-06",title:lang==="zh"?"2025 WBrC 世界手冲冠军：中国选手彭靖洋":"2025 WBrC Champion: George Jinyang Peng (China)",
     summary:lang==="zh"?"彭靖洋以三种烘焙度混合冲煮巴拿马瑰夏的创新方案夺冠，使用Solo Dripper和Melodrip，温度从96°C递降至80°C。":"George Peng won with three roast levels of Panama Geisha via Solo Dripper + Melodrip, temperature stepping from 96°C down to 80°C.",
     detail:lang==="zh"?"这是中国选手首次获得WBrC世界冠军，标志着中国咖啡文化已跻身世界顶尖。他的制胜理念——'温度即故事'，通过精确控制从农场到杯中的每个温度节点来讲述咖啡的完整风味故事。Solo Dripper由2024年亚军Jackie Tran设计。":"China's first WBrC title. His philosophy—'Temperature is a story'—uses precise thermal control from farm to cup. The Solo Dripper was designed by 2024 finalist Jackie Tran.",color:"#E53935"},
    {id:"c2",cat:lang==="zh"?"🌱 产地":"🌱 Origin",date:"2025-03",title:lang==="zh"?"云南咖啡精品率突破31.6%，出口增长358%":"Yunnan Specialty Rate Hits 31.6%, Exports +358%",
     summary:lang==="zh"?"云南从卡蒂姆主导向多品种精品化转型。临沧秋坡庄园连夺云南杯冠军，瑰夏和黄波旁种植面积持续扩大。":"Yunnan transitions from Catimor commodity to multi-variety specialty. Geisha and Yellow Bourbon expanding across Pu'er and Baoshan.",
     detail:lang==="zh"?"精品率从2021年的8%跃升至31.6%。保山铁皮卡展现出与中美洲媲美的柑橘花果调性。厌氧发酵、酒桶发酵等创新处理法在云南广泛应用。":"Specialty rate jumped from 8% (2021) to 31.6%. Baoshan Typica shows citrus-floral profiles rivaling Central America. Anaerobic and barrel fermentation widely adopted.",color:"#4CAF50"},
    {id:"c3",cat:lang==="zh"?"📊 行业":"📊 Industry",date:"2025-02",title:lang==="zh"?"2025全球咖啡价格创历史新高，阿拉比卡破$4/磅":"2025 Coffee Prices Hit Record, Arabica Breaks $4/lb",
     summary:lang==="zh"?"巴西干旱和越南减产推动C价创50年新高。精品市场逆势增长，消费者愿为品质付溢价。":"Brazilian drought and Vietnamese decline push C-price to 50-year high. Specialty market grows counter-cyclically.",
     detail:lang==="zh"?"气候变化重塑全球咖啡种植版图。高海拔产区如古吉、娜玲珑反而受益。行业预计精品咖啡持续年均8%增长。":"Climate change reshapes coffee geography. High-altitude origins like Guji and Nariño benefit. Analysts project 8% annual specialty growth.",color:"#FF9800"},
    {id:"c4",cat:lang==="zh"?"🧪 处理法":"🧪 Processing",date:"2025-01",title:lang==="zh"?"碳浸渍法(Carbonic Maceration)成为竞赛新宠":"Carbonic Maceration Becomes Competition Favorite",
     summary:lang==="zh"?"借鉴葡萄酒工艺，在CO2环境中发酵整颗咖啡樱桃，带来草莓、热带水果和酒香的复杂层次。":"Borrowed from winemaking—whole cherry fermentation in CO2 creates complex strawberry, tropical, and wine-like layers.",
     detail:lang==="zh"?"与传统厌氧不同，碳浸渍法注入CO2而非仅排除O2，12-20°C下发酵48-96小时。Sasa Sestic(2015 WBC冠军)是先驱。哥伦比亚、厄瓜多尔、埃塞的先锋处理厂已广泛采用。":"Unlike standard anaerobic, CM injects CO2 at 12-20°C for 48-96h. Pioneered by Sasa Sestic (2015 WBC). Now widespread in Colombia, Ecuador, Ethiopia.",color:"#9C27B0"},
  ];

  // Fetch live news via Anthropic API with web_search
  const fetchNews = useCallback(async () => {
    if (loading) return;
    const now = Date.now();
    if (now - lastFetch < 5 * 60 * 1000 && liveNews.length > 0) return; // 5min cooldown
    setLoading(true);
    try {
      const query = lang === "zh"
        ? "请搜索最近的精品咖啡行业新闻，包括赛事、产地动态、行业趋势。返回JSON数组，每条包含 title, summary, cat(赛事/产地/行业/处理法), date(YYYY-MM格式)。只返回JSON数组，不要其他内容。最多返回4条。"
        : "Search for recent specialty coffee industry news including competitions, origin updates, industry trends. Return a JSON array with title, summary, cat (Events/Origin/Industry/Processing), date (YYYY-MM). Return only the JSON array, max 4 items.";
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: query }],
          tools: [{ type: "web_search_20250305", name: "web_search" }]
        })
      });
      const data = await response.json();
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (Array.isArray(parsed) && parsed.length > 0) {
        const catColors = {"赛事":"#E53935","Events":"#E53935","产地":"#4CAF50","Origin":"#4CAF50","行业":"#FF9800","Industry":"#FF9800","处理法":"#9C27B0","Processing":"#9C27B0"};
        const catEmoji = {"赛事":"🏆","Events":"🏆","产地":"🌱","Origin":"🌱","行业":"📊","Industry":"📊","处理法":"🧪","Processing":"🧪"};
        setLiveNews(parsed.map((n, i) => ({
          id: `live-${i}`,
          cat: `${catEmoji[n.cat]||"📰"} ${n.cat}`,
          color: catColors[n.cat] || "#2196F3",
          date: n.date || new Date().toISOString().slice(0,7),
          title: n.title,
          summary: n.summary,
          detail: null,
          live: true
        })));
        setLastFetch(now);
      }
    } catch (e) {
      console.log("News fetch failed:", e);
    }
    setLoading(false);
  }, [lang, loading, lastFetch, liveNews.length]);

  useEffect(() => { fetchNews(); }, []);

  const allNews = [...liveNews, ...CURATED];

  return (
    <div style={{ padding: "20px 20px 0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em", margin: 0 }}>{lang==="zh"?"咖啡资讯":"Coffee News"}</h2>
        <button onClick={fetchNews} disabled={loading} style={{ background: "none", border: `1px solid ${theme.border}`, borderRadius: 8, padding: "4px 10px", fontSize: 11, color: theme.highlight, cursor: loading?"not-allowed":"pointer", opacity: loading?0.5:1 }}>
          {loading ? (lang==="zh"?"刷新中...":"Loading...") : "🔄 " + (lang==="zh"?"刷新":"Refresh")}
        </button>
      </div>
      <div style={{ fontSize: 12, color: theme.textSec, marginBottom: 14 }}>{lang==="zh"?"赛事 · 产地 · 行业动态":"Events · Origins · Industry"}</div>

      {loading && liveNews.length === 0 && (
        <div style={{ ...glassStyle(dark), padding: 24, textAlign: "center", marginBottom: 12 }}>
          <div style={{ width: 28, height: 28, border: `3px solid ${theme.border}`, borderTop: `3px solid ${theme.highlight}`, borderRadius: "50%", margin: "0 auto 10px", animation: "spin 0.8s linear infinite" }} />
          <div style={{ fontSize: 13, color: theme.textSec }}>{lang==="zh"?"正在获取最新咖啡资讯...":"Fetching latest coffee news..."}</div>
        </div>
      )}

      {allNews.map((n, i) => (
        <div key={n.id} onClick={() => n.detail && setExpanded(expanded === n.id ? null : n.id)} style={{ ...glassStyle(dark), padding: 13, marginBottom: 8, cursor: n.detail ? "pointer" : "default", borderLeft: `3px solid ${n.color}`, animation: `fadeInUp 0.3s ease-out ${i * 0.05}s both` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 10, color: n.color, fontWeight: 600 }}>{n.cat}</span>
              {n.live && <span style={{ fontSize: 8, padding: "1px 4px", borderRadius: 4, background: "rgba(76,175,80,0.15)", color: "#4CAF50", fontWeight: 600 }}>LIVE</span>}
            </div>
            <span style={{ fontSize: 10, color: theme.textSec }}>{n.date}</span>
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: theme.text, lineHeight: 1.4, marginBottom: 4 }}>{n.title}</div>
          <div style={{ fontSize: 11, color: theme.textSec, lineHeight: 1.5 }}>{n.summary}</div>
          {expanded === n.id && n.detail && (
            <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${theme.border}`, fontSize: 12, color: theme.text, lineHeight: 1.7, animation: "fadeIn 0.2s" }}>
              {n.detail}
            </div>
          )}
          {n.detail && (
            <div style={{ textAlign: "right", marginTop: 4 }}>
              <span style={{ fontSize: 10, color: theme.highlight }}>{expanded === n.id ? (lang==="zh"?"收起 ▲":"Collapse ▲") : (lang==="zh"?"展开 ▼":"More ▼")}</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

  const records = userData?.records || [];

  if (view === "log") return <LogView records={records} theme={theme} dark={dark} onBack={() => setView("main")} deleteRecord={deleteRecord} />;
  if (view === "stats") return <StatsView records={records} theme={theme} dark={dark} onBack={() => setView("main")} />;
  if (view === "achievements") {
    const unlockedSet = new Set(userData?.achievements || []);
    const cats = [
      {id:"beginner",name:lang==="zh"?"🌱 入门":"🌱 Beginner",achs:ACHIEVEMENTS.filter(a=>a.category==="beginner")},
      {id:"origin",name:lang==="zh"?"🌍 产地探索":"🌍 Origins",achs:ACHIEVEMENTS.filter(a=>a.category==="origin")},
      {id:"process",name:lang==="zh"?"🧪 处理法":"🧪 Process",achs:ACHIEVEMENTS.filter(a=>a.category==="process")},
      {id:"brew",name:lang==="zh"?"☕ 冲煮方式":"☕ Brew",achs:ACHIEVEMENTS.filter(a=>a.category==="brew")},
      {id:"special",name:lang==="zh"?"🏆 特殊成就":"🏆 Special",achs:ACHIEVEMENTS.filter(a=>a.category==="special")},
    ];
    return (
      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,animation:"fadeInUp 0.3s ease-out"}}>
          <button onClick={()=>setView("main")} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><ArrowLeft size={22} color={theme.text} /></button>
          <h2 style={{fontSize:22,fontWeight:700,margin:0}}>{lang==="zh"?"成就":"Achievements"}</h2>
          <span style={{fontSize:13,color:theme.textSec,marginLeft:"auto"}}>{unlockedSet.size}/{ACHIEVEMENTS.length}</span>
        </div>
        <div style={{height:5,borderRadius:3,background:dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",marginBottom:20,animation:"fadeInUp 0.3s ease-out 0.05s both"}}>
          <div style={{height:5,borderRadius:3,background:`linear-gradient(90deg,${theme.primary},${theme.highlight})`,width:`${(unlockedSet.size/ACHIEVEMENTS.length)*100}%`,transition:"width 0.5s"}} />

function LogView({ records, theme, dark, onBack, deleteRecord }) {
  const [filter, setFilter] = useState("");
  const filtered = filter ? records.filter(r => {

  return (
    <div style={{ padding: "20px 20px 0" }}>

        </button>
        <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>咖啡日志</h2>
        <span style={{ fontSize: 13, color: theme.textSec, marginLeft: "auto" }}>{records.length} 条</span>

      {records.length === 0 ? (
        <div style={{ textAlign: "center", padding: 48, color: theme.textSec }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>📝</div>
          <div>还没有品鉴记录</div>

          return (
            <div key={r.id} style={{ ...glassStyle(dark), padding: 14, marginBottom: 8, animation: `fadeInUp 0.3s ease-out ${Math.min(i, 10) * 0.04}s both` }}>

                <span style={{ fontSize: 24 }}>{c.origin.flag}</span>

                  <div style={{ fontSize: 15, fontWeight: 600, color: theme.text }}>{c.name}</div>
                  <div style={{ fontSize: 12, color: theme.textSec }}>
                    {r.date} · {BREW_METHODS.find(b => b.id === r.brewMethod)?.icon} {BREW_METHODS.find(b => b.id === r.brewMethod)?.name} · {"☕".repeat(r.rating)}
                  </div>
                </div>
                <button onClick={(e) => { e.stopPropagation(); deleteRecord(r.id); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, opacity: 0.4 }}>

}

function StatsView({ records, theme, dark, onBack }) {
  if (records.length === 0) {
    return (
      <div style={{ padding: "20px 20px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>

          <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>统计面板</h2>
        </div>
        <div style={{ textAlign: "center", padding: 48, color: theme.textSec }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
          <div>记录更多品鉴来查看统计数据</div>
        </div>
      </div>
    );
  }

  // Country distribution
  const countryData = {};
  records.forEach(r => {
    const c = COFFEE_DB.find(x => x.id === r.coffeeId);
    if (c) { const cn = c.origin.country_zh; countryData[cn] = (countryData[cn] || 0) + 1; }
  });
  const pieData = Object.entries(countryData).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  const COLORS = ["#FF7043","#66BB6A","#FFA726","#42A5F5","#AB47BC","#FFCA28","#26C6DA","#EC407A","#8D6E63","#78909C","#D4E157","#FF8A65"];

  // Process distribution
  const processData = {};
  records.forEach(r => {
    const c = COFFEE_DB.find(x => x.id === r.coffeeId);
    if (c) { const p = c.process_zh; processData[p] = (processData[p] || 0) + 1; }
  });
  const barData = Object.entries(processData).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);

  // Rating distribution
  const ratingData = [1,2,3,4,5].map(r => ({ name: `${r}星`, value: records.filter(x => x.rating === r).length }));

  // Monthly trend
  const monthData = {};
  records.forEach(r => {
    const m = r.date?.slice(0, 7);
    if (m) monthData[m] = (monthData[m] || 0) + 1;

  const lineData = Object.entries(monthData).sort().map(([name, value]) => ({ name: name.slice(5), value }));

  return (
    <div style={{ padding: "20px 20px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><ArrowLeft size={22} color={theme.text} /></button>
        <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>统计面板</h2>
      </div>

      {/* Country Pie */}
      <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>🌍 产地分布</div>
        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={pieData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">
              {pieData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
            </Pie>
            <Tooltip contentStyle={{ background: dark ? "#1a1410" : "#fff", border: "none", borderRadius: 8, fontSize: 12 }} />
          </PieChart>
        </ResponsiveContainer>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
          {pieData.slice(0, 6).map((d, i) => (
            <span key={d.name} style={{ fontSize: 11, color: theme.textSec, display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 8, height: 8, borderRadius: 4, background: COLORS[i % COLORS.length], display: "inline-block" }} />{d.name} {d.value}
            </span>
          ))}
        </div>
      </div>

      {/* Process Bar */}
      <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>🧪 处理法偏好</div>
        <ResponsiveContainer width="100%" height={160}>
          <BarChart data={barData} layout="vertical">
            <XAxis type="number" hide />
            <YAxis type="category" dataKey="name" width={70} tick={{ fontSize: 12, fill: theme.textSec }} />
            <Bar dataKey="value" fill={theme.highlight} radius={[0, 6, 6, 0]} />
            <Tooltip contentStyle={{ background: dark ? "#1a1410" : "#fff", border: "none", borderRadius: 8, fontSize: 12 }} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Rating */}
      <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>⭐ 评分分布</div>
        <ResponsiveContainer width="100%" height={140}>
          <BarChart data={ratingData}>
            <XAxis dataKey="name" tick={{ fontSize: 12, fill: theme.textSec }} />
            <YAxis hide />
            <Bar dataKey="value" fill={theme.primary} radius={[6, 6, 0, 0]} />
            <Tooltip contentStyle={{ background: dark ? "#1a1410" : "#fff", border: "none", borderRadius: 8, fontSize: 12 }} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Trend */}
      {lineData.length > 1 && (
        <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>📈 品鉴趋势</div>
          <ResponsiveContainer width="100%" height={140}>
            <LineChart data={lineData}>
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: theme.textSec }} />
              <YAxis hide />
              <Line type="monotone" dataKey="value" stroke={theme.highlight} strokeWidth={2} dot={{ fill: theme.highlight, r: 3 }} />
              <Tooltip contentStyle={{ background: dark ? "#1a1410" : "#fff", border: "none", borderRadius: 8, fontSize: 12 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Flavor Radar */}
      {(() => {
        const flavorCats = {"花香":0,"果味":0,"甜感":0,"坚果/可可":0,"香料":0,"醇厚":0};
        const flavorMap = {"茉莉":"花香","茉莉花":"花香","玫瑰":"花香","白花":"花香","花香":"花香","橙花":"花香",
          "柑橘":"果味","柠檬":"果味","蓝莓":"果味","草莓":"果味","百香果":"果味","芒果":"果味","蜜桃":"果味","苹果":"果味","红苹果":"果味","青苹果":"果味","黑莓":"果味","红莓":"果味","葡萄":"果味","葡萄柚":"果味","荔枝":"果味","杏桃":"果味","热带水果":"果味","发酵水果":"果味","柠檬茶":"果味","佛手柑":"果味","红樱桃":"果味","黑醋栗":"果味","柚子":"果味","青梅":"果味","橙子":"果味","橙皮":"果味","白葡萄":"果味",
          "蜂蜜":"甜感","焦糖":"甜感","红糖":"甜感","黄糖":"甜感","黑糖":"甜感","蔗糖":"甜感","太妃糖":"甜感","牛奶巧克力":"甜感","饼干":"甜感","香草":"甜感","奶油":"甜感","蜜饯":"甜感","水果糖":"甜感","白巧克力":"甜感",
          "坚果":"坚果/可可","巧克力":"坚果/可可","可可":"坚果/可可","黑巧克力":"坚果/可可","杏仁":"坚果/可可","烤杏仁":"坚果/可可","榛果":"坚果/可可","核桃":"坚果/可可","花生":"坚果/可可",
          "肉桂":"香料","丁香":"香料","桂皮":"香料","烟草":"香料","烟丝":"香料","草药":"香料","松木":"香料","雪松":"香料","泥土":"香料","烟熏":"香料","香料":"香料","干果":"香料","红酒":"香料","威士忌":"香料","雪莉酒":"香料","酒香":"香料","草本":"香料",
          "醇厚":"醇厚","顺滑":"醇厚","柔和":"醇厚"};
        records.forEach(r => {
          const c = COFFEE_DB.find(x => x.id === r.coffeeId);
          c?.flavor_notes?.forEach(f => { const cat = flavorMap[f]; if (cat) flavorCats[cat]++; });
        });
        const maxVal = Math.max(...Object.values(flavorCats), 1);
        const radarData = Object.entries(flavorCats).map(([f, v]) => ({ flavor: f, value: Math.round(v / maxVal * 100) }));
        if (Object.values(flavorCats).every(v => v === 0)) return null;
        return (
          <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>🎯 风味雷达</div>
            <ResponsiveContainer width="100%" height={220}>
              <RadarChart data={radarData} cx="50%" cy="50%" outerRadius="70%">
                <PolarGrid stroke={dark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.08)"} />
                <PolarAngleAxis dataKey="flavor" tick={{ fontSize: 12, fill: theme.textSec }} />
                <Radar dataKey="value" stroke={theme.highlight} fill={theme.highlight} fillOpacity={0.25} strokeWidth={2} />
              </RadarChart>
            </ResponsiveContainer>
          </div>
        );
      })()}

      {/* Brew Donut */}
      {(() => {
        const brewData = {};
        records.forEach(r => {
          const b = BREW_METHODS.find(x => x.id === r.brewMethod);
          if (b) brewData[b.name] = (brewData[b.name] || 0) + 1;
        });
        const donutData = Object.entries(brewData).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
        if (donutData.length === 0) return null;
        const BCOLORS = ["#E8985A","#D4A574","#6F4E37","#A67B5B","#C19A6B","#8B6914"];
        return (
          <div style={{ ...glassStyle(dark), padding: 16, marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: theme.text, marginBottom: 12 }}>🫖 冲煮方式偏好</div>
            <ResponsiveContainer width="100%" height={180}>
              <PieChart>
                <Pie data={donutData} cx="50%" cy="50%" innerRadius={45} outerRadius={70} paddingAngle={3} dataKey="value">
                  {donutData.map((_, i) => <Cell key={i} fill={BCOLORS[i % BCOLORS.length]} />)}
                </Pie>
                <Tooltip contentStyle={{ background: dark ? "#1a1410" : "#fff", border: "none", borderRadius: 8, fontSize: 12 }} />
              </PieChart>
            </ResponsiveContainer>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
              {donutData.map((d, i) => (
                <span key={d.name} style={{ fontSize: 11, color: theme.textSec, display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 4, background: BCOLORS[i % BCOLORS.length], display: "inline-block" }} />{d.name} {d.value}
                </span>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}
